version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bugtracker-mysql
    environment:
      MYSQL_ROOT_PASSWORD: supriya123
      MYSQL_DATABASE: bugtracker
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bugtracker-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bugtracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: supriya123
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  mysql_data:
  uploads:
