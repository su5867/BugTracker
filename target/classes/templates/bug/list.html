<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Bug List')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-wrapper">
  <div class="container-fluid py-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="h3 fw-bold mb-0">Bug Tracker</h1>
        <p class="text-muted mb-0"
           th:text="${bugs.totalElements} + ' bugs found'">0 bugs</p>
      </div>
      <a th:href="@{/bugs/new}" class="btn btn-danger">
        <i class="fas fa-plus me-1"></i>Report Bug
      </a>
    </div>

    <!-- Flash -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filters -->
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body p-3">
        <form th:action="@{/bugs}" method="get" class="row g-2 align-items-end">
          <div class="col-md-3">
            <label class="form-label small fw-semibold text-muted text-uppercase">Search</label>
            <input type="text" name="keyword" class="form-control form-control-sm"
                   placeholder="Search title..." th:value="${keyword}"/>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold text-muted text-uppercase">Status</label>
            <select name="status" class="form-select form-select-sm">
              <option value="">All Statuses</option>
              <option th:each="s : ${statuses}"
                      th:value="${s}" th:text="${s}"
                      th:selected="${s.name() == currentStatus}"></option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold text-muted text-uppercase">Priority</label>
            <select name="priority" class="form-select form-select-sm">
              <option value="">All Priorities</option>
              <option th:each="p : ${priorities}"
                      th:value="${p}" th:text="${p}"
                      th:selected="${p.name() == currentPriority}"></option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-semibold text-muted text-uppercase">Project</label>
            <select name="projectId" class="form-select form-select-sm">
              <option value="">All Projects</option>
              <option th:each="proj : ${projects}"
                      th:value="${proj.id}" th:text="${proj.name}"
                      th:selected="${proj.id == currentProjectId}"></option>
            </select>
          </div>
          <div class="col-md-2 d-flex gap-1">
            <button type="submit" class="btn btn-primary btn-sm flex-fill">
              <i class="fas fa-filter me-1"></i>Filter
            </button>
            <a th:href="@{/bugs}" class="btn btn-outline-secondary btn-sm">
              <i class="fas fa-times"></i>
            </a>
          </div>
        </form>
      </div>
    </div>

    <!-- Bug Table -->
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th style="width:60px">#ID</th>
              <th>Title</th>
              <th>Project</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Assigned To</th>
              <th>Reported By</th>
              <th>Created</th>
              <th style="width:70px">View</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${bugs.isEmpty()}">
              <td colspan="9" class="text-center py-5 text-muted">
                <i class="fas fa-check-circle fa-2x text-success mb-2 d-block"></i>
                No bugs match the current filters
              </td>
            </tr>
            <tr th:each="bug : ${bugs.content}">
              <td class="text-muted small fw-semibold">
                #<span th:text="${bug.id}"></span>
              </td>
              <td>
                <a th:href="@{/bugs/{id}(id=${bug.id})}"
                   class="text-decoration-none text-dark fw-semibold"
                   th:text="${bug.title}">Bug Title</a>
                <div class="text-muted" style="font-size:11px"
                     th:text="${bug.severity}"></div>
              </td>
              <td>
                <a th:href="@{/projects/{id}(id=${bug.project.id})}"
                   class="text-decoration-none small"
                   th:text="${bug.project.name}">Project</a>
              </td>
              <td>
                <span class="badge rounded-pill fw-normal"
                      th:classappend="${bug.priority.name() == 'CRITICAL'} ? 'bg-danger'
                                   : (${bug.priority.name() == 'HIGH'}     ? 'bg-warning text-dark'
                                   : (${bug.priority.name() == 'MEDIUM'}   ? 'bg-info text-dark'
                                   : 'bg-secondary'))"
                      th:text="${bug.priority}"></span>
              </td>
              <td>
                <span class="badge rounded-pill fw-normal"
                      th:classappend="${bug.status.name() == 'OPEN'}        ? 'bg-danger'
                                   : (${bug.status.name() == 'IN_PROGRESS'} ? 'bg-primary'
                                   : (${bug.status.name() == 'RESOLVED'}    ? 'bg-success'
                                   : 'bg-secondary'))"
                      th:text="${bug.status}"></span>
              </td>
              <td class="small"
                  th:text="${bug.assignedTo != null} ?
                             (${bug.assignedTo.fullName} ?: ${bug.assignedTo.username}) :
                             'Unassigned'">
              </td>
              <td class="small"
                  th:text="${bug.createdBy != null ? bug.createdBy.username : '—'}">
              </td>
              <!-- FIX: null-safe createdAt -->
              <td class="small text-muted"
                  th:text="${bug.createdAt != null} ?
                             ${#temporals.format(bug.createdAt,'MMM d, yyyy')} : '—'">
              </td>
              <td>
                <a th:href="@{/bugs/{id}(id=${bug.id})}"
                   class="btn btn-sm btn-outline-primary">
                  <i class="fas fa-eye"></i>
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3"
           th:if="${bugs.totalPages > 1}">
        <span class="text-muted small">
          Page <strong th:text="${bugs.number + 1}">1</strong>
          of <strong th:text="${bugs.totalPages}">1</strong>
        </span>
        <nav>
          <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${bugs.first} ? 'disabled'">
              <a class="page-link"
                 th:href="@{/bugs(page=${bugs.number - 1},size=${bugs.size},
                               keyword=${keyword},status=${currentStatus},
                               priority=${currentPriority},projectId=${currentProjectId})}">«</a>
            </li>
            <li class="page-item active">
              <span class="page-link" th:text="${bugs.number + 1}">1</span>
            </li>
            <li class="page-item" th:classappend="${bugs.last} ? 'disabled'">
              <a class="page-link"
                 th:href="@{/bugs(page=${bugs.number + 1},size=${bugs.size},
                               keyword=${keyword},status=${currentStatus},
                               priority=${currentPriority},projectId=${currentProjectId})}">»</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>

  </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
