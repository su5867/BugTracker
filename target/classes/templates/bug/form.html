<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Bug Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-wrapper">
    <div class="container py-4" style="max-width:860px">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/bugs}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-arrow-left"></i></a>
            <h1 class="h3 fw-bold mb-0" th:text="${isNew} ? 'Report New Bug' : 'Edit Bug #' + ${bugDto.id}">Bug</h1>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form th:action="${bugDto.id != null} ? @{/bugs/{id}/update(id=${bugDto.id})} : @{/bugs}"
                      th:object="${bugDto}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Bug Title <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{title}"
                                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                                   placeholder="Brief, descriptive title of the bug"/>
                            <div class="invalid-feedback" th:errors="*{title}"></div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="5"
                                      placeholder="Steps to reproduce, expected vs actual behavior..."></textarea>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Project <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{projectId}"
                                    th:classappend="${#fields.hasErrors('projectId')} ? 'is-invalid'">
                                <option value="">Select project...</option>
                                <option th:each="proj : ${projects}" th:value="${proj.id}" th:text="${proj.name}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{projectId}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Assign Developer</label>
                            <select class="form-select" th:field="*{assignedToId}">
                                <option value="">Unassigned</option>
                                <option th:each="dev : ${developers}" th:value="${dev.id}"
                                        th:text="${dev.fullName ?: dev.username}"></option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Priority <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{priority}">
                                <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"></option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Severity <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{severity}">
                                <option th:each="s : ${severities}" th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>

                        <div class="col-md-4" th:if="${!isNew}">
                            <label class="form-label fw-semibold">Status</label>
                            <select class="form-select" th:field="*{status}">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold">Attachment <span class="text-muted small">(optional)</span></label>
                            <input type="file" class="form-control" name="attachment"/>
                            <div class="form-text">Max file size: 10MB</div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4 pt-3 border-top">
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="fas fa-save me-2"></i>
                            <span th:text="${isNew} ? 'Submit Bug' : 'Update Bug'">Save</span>
                        </button>
                        <a th:href="@{/bugs}" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
