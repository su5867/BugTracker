<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Project Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-wrapper">
    <div class="container py-4" style="max-width:780px">
        <div class="d-flex align-items-center mb-4 gap-2">
            <a th:href="@{/projects}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-arrow-left"></i></a>
            <h1 class="h3 fw-bold mb-0" th:text="${projectDto.id != null} ? 'Edit Project' : 'New Project'">Project</h1>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form th:action="${projectDto.id != null} ? @{/projects/{id}/update(id=${projectDto.id})} : @{/projects}"
                      th:object="${projectDto}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Project Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" placeholder="e.g. E-Commerce Platform"/>
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="4" placeholder="Project description..."></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Start Date <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{startDate}"
                                   th:classappend="${#fields.hasErrors('startDate')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{startDate}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Status</label>
                            <select class="form-select" th:field="*{status}">
                                <option th:each="s : ${T(com.bugtracker.entity.ProjectStatus).values()}"
                                        th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Assign Members</label>
                            <div class="border rounded-3 p-3" style="max-height:220px;overflow-y:auto;">
                                <div class="row g-2">
                                    <div class="col-md-6" th:each="user : ${allUsers}">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox"
                                                   name="memberIds" th:value="${user.id}"
                                                   th:checked="${projectDto.memberIds != null and projectDto.memberIds.contains(user.id)}"
                                                   th:id="'member-' + ${user.id}"/>
                                            <label class="form-check-label" th:for="'member-' + ${user.id}">
                                                <span th:text="${user.fullName ?: user.username}"></span>
                                                <span class="badge bg-secondary ms-1 rounded-pill" style="font-size:10px"
                                                      th:text="${user.getPrimaryRoleName()}"></span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="fas fa-save me-2"></i>
                            <span th:text="${projectDto.id != null} ? 'Update Project' : 'Create Project'">Save</span>
                        </button>
                        <a th:href="@{/projects}" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
