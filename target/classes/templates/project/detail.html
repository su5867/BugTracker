<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Project Detail')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-wrapper">
  <div class="container-fluid py-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="d-flex align-items-center gap-2">
        <a th:href="@{/projects}" class="btn btn-sm btn-outline-secondary">
          <i class="fas fa-arrow-left"></i>
        </a>
        <div>
          <h1 class="h3 fw-bold mb-0" th:text="${project.name}">Project</h1>
          <span class="badge rounded-pill"
                th:text="${project.status}"
                th:classappend="${project.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'">
          </span>
        </div>
      </div>
      <div sec:authorize="hasAuthority('ROLE_ADMIN')">
        <a th:href="@{/projects/{id}/edit(id=${project.id})}"
           class="btn btn-outline-primary me-2">
          <i class="fas fa-edit me-1"></i>Edit
        </a>
        <a th:href="@{/bugs/new(projectId=${project.id})}" class="btn btn-danger">
          <i class="fas fa-plus me-1"></i>Add Bug
        </a>
      </div>
    </div>

    <!-- Flash -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

      <!-- Left sidebar -->
      <div class="col-lg-4">
        <!-- Project info card -->
        <div class="card border-0 shadow-sm mb-4">
          <div class="card-header bg-white border-0 py-3">
            <h6 class="fw-bold mb-0">Project Info</h6>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <small class="text-muted text-uppercase fw-semibold">Description</small>
              <p class="mt-1 mb-0"
                 th:text="${project.description != null and !project.description.isEmpty()} ? ${project.description} : 'No description'">
              </p>
            </div>
            <div class="mb-3">
              <small class="text-muted text-uppercase fw-semibold">Start Date</small>
              <!-- FIX: null-safe date -->
              <p class="mt-1 mb-0"
                 th:text="${project.startDate != null} ? ${#temporals.format(project.startDate,'dd MMM yyyy')} : '—'">
              </p>
            </div>
            <div class="mb-3">
              <small class="text-muted text-uppercase fw-semibold">Created By</small>
              <p class="mt-1 mb-0"
                 th:text="${project.createdBy != null} ? (${project.createdBy.fullName} ?: ${project.createdBy.username}) : '—'">
              </p>
            </div>
            <div>
              <small class="text-muted text-uppercase fw-semibold">Created At</small>
              <!-- FIX: null-safe datetime -->
              <p class="mt-1 mb-0"
                 th:text="${project.createdAt != null} ? ${#temporals.format(project.createdAt,'dd MMM yyyy')} : '—'">
              </p>
            </div>
          </div>
        </div>

        <!-- Members card -->
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white border-0 py-3">
            <h6 class="fw-bold mb-0">
              <i class="fas fa-users me-2"></i>Members
              (<span th:text="${project.members != null ? project.members.size() : 0}">0</span>)
            </h6>
          </div>
          <ul class="list-group list-group-flush">
            <li th:if="${project.members == null or project.members.isEmpty()}"
                class="list-group-item text-muted text-center py-3">
              No members assigned
            </li>
            <li class="list-group-item d-flex align-items-center gap-2 py-2"
                th:each="member : ${project.members}">
              <div class="avatar-sm">
                <span th:text="${member.fullName != null and !member.fullName.isEmpty()} ?
                               ${member.fullName.substring(0,1).toUpperCase()} :
                               ${member.username.substring(0,1).toUpperCase()}">U</span>
              </div>
              <div>
                <div class="fw-semibold small"
                     th:text="${member.fullName != null and !member.fullName.isEmpty()} ? ${member.fullName} : ${member.username}">
                </div>
                <span class="badge bg-light text-dark border" style="font-size:10px"
                      th:text="${member.getPrimaryRoleName()}"></span>
              </div>
            </li>
          </ul>
        </div>
      </div>

      <!-- Right: Bugs table -->
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
            <h6 class="fw-bold mb-0">
              <i class="fas fa-bug me-2 text-danger"></i>Bugs
              (<span th:text="${project.bugs != null ? project.bugs.size() : 0}">0</span>)
            </h6>
            <a th:href="@{/bugs/new(projectId=${project.id})}"
               class="btn btn-sm btn-outline-danger">
              <i class="fas fa-plus me-1"></i>Add Bug
            </a>
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>#</th>
                  <th>Title</th>
                  <th>Priority</th>
                  <th>Status</th>
                  <th>Assigned</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr th:if="${project.bugs == null or project.bugs.isEmpty()}">
                  <td colspan="6" class="text-center text-muted py-4">
                    No bugs reported for this project
                  </td>
                </tr>
                <tr th:each="bug : ${project.bugs}">
                  <td class="text-muted small" th:text="${bug.id}"></td>
                  <td>
                    <a th:href="@{/bugs/{id}(id=${bug.id})}"
                       class="text-decoration-none fw-semibold"
                       th:text="${bug.title}">Bug</a>
                  </td>
                  <td>
                    <span class="badge rounded-pill"
                          th:classappend="${bug.priority.name() == 'CRITICAL'} ? 'bg-danger'
                                       : (${bug.priority.name() == 'HIGH'}     ? 'bg-warning text-dark'
                                       : (${bug.priority.name() == 'MEDIUM'}   ? 'bg-info text-dark'
                                       : 'bg-secondary'))"
                          th:text="${bug.priority}"></span>
                  </td>
                  <td>
                    <span class="badge rounded-pill"
                          th:classappend="${bug.status.name() == 'OPEN'}        ? 'bg-danger'
                                       : (${bug.status.name() == 'IN_PROGRESS'} ? 'bg-primary'
                                       : (${bug.status.name() == 'RESOLVED'}    ? 'bg-success'
                                       : 'bg-secondary'))"
                          th:text="${bug.status}"></span>
                  </td>
                  <td class="small"
                      th:text="${bug.assignedTo != null} ? (${bug.assignedTo.fullName} ?: ${bug.assignedTo.username}) : 'Unassigned'">
                  </td>
                  <td>
                    <a th:href="@{/bugs/{id}(id=${bug.id})}"
                       class="btn btn-sm btn-outline-secondary">
                      <i class="fas fa-eye"></i>
                    </a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
