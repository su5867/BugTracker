<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Access Denied')}"></head>
<body class="d-flex align-items-center justify-content-center bg-light" style="min-height:100vh">
<div class="text-center">
    <div class="display-1 fw-bold text-danger mb-3">403</div>
    <h2 class="fw-bold">Access Denied</h2>
    <p class="text-muted" th:text="${message ?: 'You do not have permission to access this page.'}"></p>
    <a th:href="@{/dashboard}" class="btn btn-danger mt-3"><i class="fas fa-home me-1"></i>Go Home</a>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
