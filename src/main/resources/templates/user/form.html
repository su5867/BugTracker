<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('User Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-wrapper">
    <div class="container py-4" style="max-width:600px">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/users}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-arrow-left"></i></a>
            <h1 class="h3 fw-bold mb-0" th:text="${userDto.id != null} ? 'Edit User' : 'Add User'">User</h1>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
                <form th:action="${userDto.id != null} ? @{/users/{id}/update(id=${userDto.id})} : @{/users}"
                      th:object="${userDto}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Full Name</label>
                            <input type="text" class="form-control" th:field="*{fullName}" placeholder="John Doe"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{username}"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                   th:readonly="${userDto.id != null}" placeholder="johndoe"/>
                            <div class="invalid-feedback" th:errors="*{username}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="john@example.com"/>
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">
                                Password <span th:text="${userDto.id != null} ? '(leave blank to keep current)' : '*'"></span>
                            </label>
                            <input type="password" class="form-control" th:field="*{password}"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" placeholder="Min 6 characters"/>
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Role</label>
                            <select class="form-select" th:field="*{role}">
                                <option value="ADMIN">Admin</option>
                                <option value="DEVELOPER">Developer</option>
                                <option value="TESTER">Tester</option>
                            </select>
                        </div>
                        <div class="col-md-6" th:if="${userDto.id != null}">
                            <label class="form-label fw-semibold">Status</label>
                            <div class="form-check form-switch mt-2">
                                <input class="form-check-input" type="checkbox" th:field="*{enabled}" role="switch"/>
                                <label class="form-check-label" th:for="${#ids.next('enabled')}">Active Account</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4 pt-3 border-top">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="fas fa-save me-2"></i>
                            <span th:text="${userDto.id != null} ? 'Update User' : 'Create User'">Save</span>
                        </button>
                        <a th:href="@{/users}" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
