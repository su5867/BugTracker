<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('User Management')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-wrapper">
  <div class="container-fluid py-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="h3 fw-bold mb-0">User Management</h1>
        <p class="text-muted mb-0"
           th:text="${users.size()} + ' users registered'">0 users</p>
      </div>
      <a th:href="@{/users/new}" class="btn btn-primary">
        <i class="fas fa-user-plus me-1"></i>Add User
      </a>
    </div>

    <!-- Flash -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
      <span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Table -->
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>User</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(users)}">
              <td colspan="7" class="text-center py-5 text-muted">No users found</td>
            </tr>
            <tr th:each="user : ${users}">
              <td class="text-muted small" th:text="${user.id}"></td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <div class="avatar-sm">
                    <!-- FIX: safe substring on possibly null fullName/username -->
                    <span th:text="${user.fullName != null and !user.fullName.isEmpty()}
                                    ? ${user.fullName.substring(0,1).toUpperCase()}
                                    : ${user.username.substring(0,1).toUpperCase()}">U</span>
                  </div>
                  <div>
                    <div class="fw-semibold"
                         th:text="${user.fullName != null and !user.fullName.isEmpty()} ? ${user.fullName} : ${user.username}">
                    </div>
                    <div class="text-muted small" th:text="${'@' + user.username}"></div>
                  </div>
                </div>
              </td>
              <td class="small" th:text="${user.email}"></td>
              <td>
                <span class="badge rounded-pill"
                      th:classappend="${user.getPrimaryRoleName() == 'ADMIN'}     ? 'bg-danger'
                                   : (${user.getPrimaryRoleName() == 'DEVELOPER'} ? 'bg-primary'
                                   : 'bg-success')"
                      th:text="${user.getPrimaryRoleName()}"></span>
              </td>
              <td>
                <span th:class="${user.enabled} ? 'badge bg-success' : 'badge bg-secondary'"
                      th:text="${user.enabled} ? 'Active' : 'Disabled'"></span>
              </td>
              <!-- FIX: null-safe createdAt -->
              <td class="small text-muted"
                  th:text="${user.createdAt != null} ?
                             ${#temporals.format(user.createdAt,'MMM d, yyyy')} : '—'">
              </td>
              <td>
                <div class="d-flex gap-1">
                  <a th:href="@{/users/{id}/edit(id=${user.id})}"
                     class="btn btn-sm btn-outline-primary">
                    <i class="fas fa-edit"></i>
                  </a>
                  <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post"
                        onsubmit="return confirm('Delete user ' + [[${user.username}]] + '?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                      <i class="fas fa-trash"></i>
                    </button>
                  </form>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
