<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Tester Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-wrapper">
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 fw-bold mb-0">Tester Dashboard</h1>
                <p class="text-muted mb-0">Bugs you reported</p>
            </div>
            <a th:href="@{/bugs/new}" class="btn btn-danger">
                <i class="fas fa-plus me-1"></i>Report Bug
            </a>
        </div>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="stat-card card border-0 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="stat-icon bg-danger-subtle rounded-3 p-3">
                            <i class="fas fa-bug fs-3 text-danger"></i>
                        </div>
                        <div>
                            <div class="fs-2 fw-bold" th:text="${myReported}">0</div>
                            <div class="text-muted">Total Reported</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card card border-0 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="stat-icon bg-warning-subtle rounded-3 p-3">
                            <i class="fas fa-hourglass-half fs-3 text-warning"></i>
                        </div>
                        <div>
                            <div class="fs-2 fw-bold" th:text="${openBugs}">0</div>
                            <div class="text-muted">Still Open</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card card border-0 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="stat-icon bg-success-subtle rounded-3 p-3">
                            <i class="fas fa-check-double fs-3 text-success"></i>
                        </div>
                        <div>
                            <div class="fs-2 fw-bold" th:text="${resolvedBugs}">0</div>
                            <div class="text-muted">Resolved/Closed</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center py-5">
                        <i class="fas fa-bug fa-3x text-danger mb-3"></i>
                        <h5 class="fw-bold">Report a New Bug</h5>
                        <p class="text-muted">Found something broken? Let the team know!</p>
                        <a th:href="@{/bugs/new}" class="btn btn-danger me-2">
                            <i class="fas fa-plus me-1"></i>Report Bug
                        </a>
                        <a th:href="@{/bugs}" class="btn btn-outline-secondary">
                            <i class="fas fa-list me-1"></i>View All Bugs
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
