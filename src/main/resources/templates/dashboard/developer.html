<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Developer Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-wrapper">
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 fw-bold mb-0">Developer Dashboard</h1>
                <p class="text-muted mb-0">Your assigned work</p>
            </div>
            <a th:href="@{/bugs(assignedUserId=${#authentication.principal.id})}" class="btn btn-primary">
                <i class="fas fa-list me-1"></i>My Bugs
            </a>
        </div>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="stat-card card border-0 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="stat-icon bg-warning-subtle rounded-3 p-3">
                            <i class="fas fa-exclamation-circle fs-3 text-warning"></i>
                        </div>
                        <div>
                            <div class="fs-2 fw-bold" th:text="${openBugs}">0</div>
                            <div class="text-muted">Open Bugs</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card card border-0 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="stat-icon bg-primary-subtle rounded-3 p-3">
                            <i class="fas fa-spinner fs-3 text-primary"></i>
                        </div>
                        <div>
                            <div class="fs-2 fw-bold" th:text="${inProgressBugs}">0</div>
                            <div class="text-muted">In Progress</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card card border-0 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="stat-icon bg-success-subtle rounded-3 p-3">
                            <i class="fas fa-check-circle fs-3 text-success"></i>
                        </div>
                        <div>
                            <div class="fs-2 fw-bold" th:text="${resolvedBugs}">0</div>
                            <div class="text-muted">Resolved</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center py-5">
                        <i class="fas fa-tasks fa-3x text-primary mb-3"></i>
                        <h5 class="fw-bold">View Your Assigned Bugs</h5>
                        <p class="text-muted">Click below to see all bugs currently assigned to you.</p>
                        <a th:href="@{/bugs}" class="btn btn-primary">
                            <i class="fas fa-bug me-2"></i>Go to Bug List
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
