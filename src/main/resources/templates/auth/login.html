<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-bug fa-3x text-danger mb-3"></i>
                        <h2 class="fw-bold">BugTracker</h2>
                        <p class="text-muted">Sign in to continue</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
                    <div th:if="${message}" class="alert alert-success py-2" th:text="${message}"></div>
                    <div th:if="${param.logout}" class="alert alert-info py-2">You have been logged out.</div>

                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus/>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 fw-semibold py-2">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </form>

                    <hr class="my-4"/>
                    <div class="text-center">
                        <small class="text-muted">Don't have an account?
                            <a th:href="@{/register}" class="text-danger fw-semibold">Register</a>
                        </small>
                    </div>

                    <div class="mt-4 p-3 bg-light rounded-3">
                        <small class="text-muted fw-semibold">Default Credentials:</small><br/>
                        <small class="text-muted">
                            <i class="fas fa-circle text-danger me-1" style="font-size:8px"></i>admin / admin123<br/>
                            <i class="fas fa-circle text-primary me-1" style="font-size:8px"></i>dev1 / dev123<br/>
                            <i class="fas fa-circle text-success me-1" style="font-size:8px"></i>tester1 / test123
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
