<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Not Found')}"></head>
<body class="d-flex align-items-center justify-content-center bg-light" style="min-height:100vh">
<div class="text-center">
    <div class="display-1 fw-bold text-warning mb-3">404</div>
    <h2 class="fw-bold">Page Not Found</h2>
    <p class="text-muted" th:text="${message ?: 'The resource you are looking for does not exist.'}"></p>
    <a th:href="@{/dashboard}" class="btn btn-warning mt-3"><i class="fas fa-home me-1"></i>Go Home</a>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
