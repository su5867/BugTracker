<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Server Error')}"></head>
<body class="d-flex align-items-center justify-content-center bg-light" style="min-height:100vh">
<div class="text-center">
    <div class="display-1 fw-bold text-secondary mb-3">500</div>
    <h2 class="fw-bold">Internal Server Error</h2>
    <p class="text-muted" th:text="${message ?: 'Something went wrong. Please try again later.'}"></p>
    <a th:href="@{/dashboard}" class="btn btn-secondary mt-3"><i class="fas fa-home me-1"></i>Go Home</a>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
